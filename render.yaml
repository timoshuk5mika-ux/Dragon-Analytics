services:
  - type: web
    name: dragon-analytics-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_NAME
        value: Dragon Analytics API
      - key: DEBUG
        value: "False"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
