services:
  postgres:
    image: postgres:16-alpine
    container_name: dragon_analytics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dragon_analytics
      POSTGRES_USER: dragon_user
      POSTGRES_PASSWORD: dragon_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragon_user -d dragon_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
